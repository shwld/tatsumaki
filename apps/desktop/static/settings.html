<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>tatsumaki Desktop Settings</title>
    <style>
      :root {
        color-scheme: light dark;
        --background: #f8fafc;
        --foreground: #0f172a;
        --border: #cbd5e1;
        --muted: #64748b;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --error: #b91c1c;
        --ok: #047857;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #0f172a;
          --foreground: #e2e8f0;
          --border: #334155;
          --muted: #94a3b8;
          --primary: #3b82f6;
          --primary-hover: #60a5fa;
          --error: #f87171;
          --ok: #34d399;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: var(--background);
        color: var(--foreground);
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        padding: 20px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
      }

      input,
      button {
        border-radius: 6px;
        border: 1px solid var(--border);
        font: inherit;
        padding: 9px 10px;
      }

      input {
        width: 100%;
        background: transparent;
        color: var(--foreground);
      }

      button {
        width: fit-content;
        min-width: 136px;
        background: var(--primary);
        border-color: var(--primary);
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-hover);
      }

      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 2px;
      }

      .hint,
      #status {
        color: var(--muted);
        font-size: 12px;
      }

      #status.ok {
        color: var(--ok);
      }

      #status.error {
        color: var(--error);
      }
    </style>
  </head>
  <body>
    <form id="settingsForm">
      <label>
        Viewer URL
        <input
          id="baseUrl"
          type="url"
          placeholder="https://tatsumaki.shwld.app"
          required
        />
      </label>
      <div class="hint">HTTPS URLs only. Saving reloads the viewer window.</div>
      <button type="submit">Save</button>
      <div id="status"></div>
    </form>

    <script>
      const api = window.desktopSettings;
      const form = document.getElementById("settingsForm");
      const baseUrl = document.getElementById("baseUrl");
      const status = document.getElementById("status");

      async function loadConfig() {
        const config = await api.getConfig();
        baseUrl.value = config.baseUrl;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const saved = await api.setBaseUrl(baseUrl.value);
          baseUrl.value = saved.baseUrl;
          status.className = "ok";
          status.textContent = "Saved";
        } catch (error) {
          status.className = "error";
          status.textContent = error?.message || "Failed to save";
        }
      });

      loadConfig().catch((error) => {
        status.className = "error";
        status.textContent = error?.message || "Failed to load settings";
      });
    </script>
  </body>
</html>
