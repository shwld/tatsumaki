name: CLI Release

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: aarch64-apple-darwin
            build_with: zigbuild
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Setup Zig
        if: matrix.build_with == 'zigbuild'
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1
      - name: Install zigbuild toolchain
        if: matrix.build_with == 'zigbuild'
        run: cargo install cargo-zigbuild --locked
      - name: Build tm with cargo
        if: matrix.build_with != 'zigbuild'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker || '' }}
        run: cargo build --manifest-path apps/cli/Cargo.toml --release --target ${{ matrix.target }}
      - name: Build tm with cargo-zigbuild
        if: matrix.build_with == 'zigbuild'
        run: cargo zigbuild --manifest-path apps/cli/Cargo.toml --release --target ${{ matrix.target }}
      - name: Package binary
        run: |
          mkdir -p dist
          cp apps/cli/target/${{ matrix.target }}/release/tm dist/tm
          tar -C dist -czf tm-${{ matrix.target }}.tar.gz tm
          rm -rf dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: tm-${{ matrix.target }}
          path: tm-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: release-assets
      - name: Flatten artifacts
        run: |
          find release-assets -name '*.tar.gz' -exec cp {} . \;
      - name: Build checksums
        run: |
          sha256sum tm-*.tar.gz | tee sha256sums.txt
      - name: Validate expected assets
        run: |
          test -f tm-aarch64-apple-darwin.tar.gz
          test -f sha256sums.txt
          sha256sum -c sha256sums.txt
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/cli-v')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          generate_release_notes: true
          files: |
            tm-*.tar.gz
            sha256sums.txt
